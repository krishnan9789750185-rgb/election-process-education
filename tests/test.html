<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElectIQ — Test Suite</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#0A0E27;color:#E8E8FF;padding:2rem}
    h1{font-size:1.5rem;margin-bottom:1rem;background:linear-gradient(135deg,#6C63FF,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .summary{padding:1rem;background:#111538;border-radius:0.75rem;margin-bottom:1.5rem;border:1px solid rgba(108,99,255,0.15)}
    .summary span{font-weight:700;margin-right:1.5rem}
    .pass{color:#00D4AA} .fail{color:#FF6B6B} .skip{color:#FFB347}
    .test-group{margin-bottom:1.5rem}
    .test-group h2{font-size:1rem;padding:0.5rem 0;border-bottom:1px solid rgba(108,99,255,0.15);margin-bottom:0.5rem}
    .test{display:flex;gap:0.75rem;padding:0.4rem 0.5rem;font-size:0.875rem;border-radius:0.25rem}
    .test:nth-child(odd){background:rgba(255,255,255,0.02)}
    .test-icon{width:20px;text-align:center}
    .test-name{flex:1}
    .test-time{color:#6B6B99;font-size:0.75rem}
    #results{margin-top:1rem}
  </style>
</head>
<body>
  <h1>🗳️ ElectIQ Test Suite</h1>
  <div class="summary" id="summary">Running tests...</div>
  <div id="results"></div>
  <script type="module" src="tests.js"></script>
</body>
</html>
